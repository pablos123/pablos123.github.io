<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            text-align: center;
        }

        body {
            background-color: black;
        }

        h1 {
            color: powderblue;
        }

        .mybutton {
            --b: 3px;
            /* border thickness */
            --s: .45em;
            /* size of the corner */
            --color: #373B44;

            padding: calc(.5em + var(--s)) calc(.9em + var(--s));
            color: var(--color);
            --_p: var(--s);
            background:
                conic-gradient(from 90deg at var(--b) var(--b), #0000 90deg, var(--color) 0) var(--_p) var(--_p)/calc(100% - var(--b) - 2*var(--_p)) calc(100% - var(--b) - 2*var(--_p));
            transition: .3s linear, color 0s, background-color 0s;
            outline: var(--b) solid #0000;
            outline-offset: .6em;
            font-size: 16px;

            border: 0;

            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .mybutton:hover,
        .mybutton:focus-visible {
            --_p: 0px;
            outline-color: var(--color);
            outline-offset: .05em;
        }

        .mybutton:active {
            background: var(--color);
            color: powderblue;
        }
    </style>
</head>

<body>
    <h1>pablo</h1>

    <button id="github" class="mybutton">Github</button>
    <button id="letterboxd" class="mybutton">Letterboxd</button>
    <button id="howlong" class="mybutton">HowLongToBeat</button>
    <button id="ig" class="mybutton">Instagram</button>

    <script type="text/javascript">
        document.getElementById("github").onclick = function () {
            window.open("https://github.com/pablos123", "_blank")
        }
        document.getElementById("letterboxd").onclick = function () {
            window.open("https://letterboxd.com/pablos123/", "_blank")
        }
        document.getElementById("howlong").onclick = function () {
            window.open("https://howlongtobeat.com/user/pablos123", "_blank")
        }
        document.getElementById("ig").onclick = function () {
            window.open("https://www.instagram.com/pablo.saavedra_/", "_blank")
        }
    </script>

</body>

</html>
