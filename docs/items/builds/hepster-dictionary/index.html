<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hepster's dictionary</title>
  <style>
    :root {
      --bg:     #282828;
      --bg1:    #3c3836;
      --bg2:    #504945;
      --fg:     #ebdbb2;
      --fg2:    #d5c4a1;
      --gray:   #928374;
      --yellow: #d79921;
      --orange: #d65d0e;
      --red:    #cc241d;
      --green:  #98971a;
      --blue:   #458588;
      --purple: #b16286;
      --aqua:   #689d6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 22px 12px;
      background: var(--bg1);
      border-bottom: 1px solid var(--bg2);
      flex-shrink: 0;
    }

    .title {
      font-size: 15px;
      color: var(--yellow);
      letter-spacing: 0.06em;
    }

    .subtitle {
      font-size: 11px;
      color: var(--gray);
      margin-top: 3px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ctl-sep {
      align-self: stretch;
      width: 1px;
      background: var(--bg2);
      margin: 2px 3px;
    }
    /* tgroup keeps a toggle cluster together so it can become its own row on
       mobile; inline on desktop, matching the surrounding gap. */
    .tgroup {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
    }
    /* Collapse-all button: mobile-only. */
    .ctl-toggle { display: none; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      color: var(--fg2);
      border: 1px solid var(--chip, var(--bg2));
      border-radius: 4px;
      padding: 4px 9px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      line-height: 1.4;
    }
    .chip:hover { filter: brightness(1.15); }
    .chip, .toggle, .ctl-toggle, .clear-btn, .rail a, .info-btn, .modal-close {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    .chip.active {
      background: var(--chip, var(--yellow));
      color: var(--bg);
      border-color: var(--chip, var(--yellow));
    }
    .info-btn {
      cursor: pointer;
      opacity: 0.7;
      font-size: 12px;
    }
    .info-btn:hover { opacity: 1; }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .search-box {
      position: relative;
      flex: 1;
      display: flex;
    }
    #search {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--bg2);
      border-radius: 4px;
      outline: none;
      padding: 9px 32px 9px 12px;
      font-family: inherit;
      font-size: 13px;
      caret-color: var(--yellow);
    }
    #search:focus { border-color: var(--yellow); }
    #search::placeholder { color: var(--gray); opacity: 0.5; }
    /* Clear (✕): shown only while the search has text, on both platforms. */
    .clear-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      font-size: 17px;
      line-height: 1;
      padding: 2px 5px;
      cursor: pointer;
    }
    .clear-btn:hover { color: var(--fg); }
    .clear-btn[hidden] { display: none; }

    #count {
      font-size: 11px;
      color: var(--gray);
      white-space: nowrap;
      flex-shrink: 0;
      /* Fixed width + right-align so the result count shrinking (e.g. "3 / 1213")
         doesn't make the flex search box grow as you type. */
      min-width: 72px;
      text-align: right;
    }

    /* Filters: deliberately quieter than the dict chips. Plain-text toggles
       (on = readable, off = dimmed + struck through). */
    .toggles {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }
    .toggle {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 11px;
      line-height: 1.4;
      color: var(--fg2);
      cursor: pointer;
    }
    .toggle:hover { color: var(--fg); }
    .toggle:not(.active) {
      color: var(--gray);
      text-decoration: line-through;
    }

    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* alphabet rail */
    .rail {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 6px;
      gap: 1px;
      background: var(--bg1);
      border-right: 1px solid var(--bg2);
      overflow-y: auto;
      scrollbar-width: none;
    }
    .rail::-webkit-scrollbar { display: none; }
    .rail a {
      color: var(--gray);
      text-decoration: none;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .rail a:hover { color: var(--bg); background: var(--yellow); }
    .rail a.dim { opacity: 0.25; pointer-events: none; }

    .entries {
      flex: 1;
      overflow-y: auto;
      padding: 18px 26px 60px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg2) transparent;
    }
    .entries::-webkit-scrollbar { width: 5px; }
    .entries::-webkit-scrollbar-track { background: transparent; }
    .entries::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }
    .entries::-webkit-scrollbar-thumb:hover { background: var(--gray); }

    .letter-group { margin-bottom: 26px; }

    .letter {
      font-size: 22px;
      color: var(--orange);
      border-bottom: 2px solid var(--bg2);
      padding-bottom: 4px;
      margin-bottom: 12px;
      scroll-margin-top: 8px;
    }

    .entry {
      margin-bottom: 11px;
      line-height: 1.6;
      max-width: 760px;
    }

    .src-block { margin-top: 4px; }
    /* Multi-source headword: each def block marked by a dict-colored left bar. */
    .src-block.tinted {
      border-left: 2px solid var(--c);
      padding-left: 9px;
      margin-left: 1px;
    }

    .term {
      color: var(--aqua);
      font-weight: bold;
      font-size: 13px;
    }
    /* Provenance: one dot per source dictionary, in that dict's color. */
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
    }
    .dot + .dot { margin-left: 3px; }

    .def {
      color: var(--fg2);
      font-size: 13px;
      margin-top: 3px;
    }

    .sense {
      display: flex;
      gap: 7px;
      margin-top: 3px;
    }
    .smark {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .snum { color: var(--gray); }
    .spos {
      color: var(--gray);
      font-style: italic;
    }
    .sbody { flex: 1; }

    .ex {
      font-style: italic;
      color: var(--gray);
    }
    .ex mark { font-style: normal; }

    .ex-line {
      margin-top: 2px;
      padding-left: 14px;
      font-size: 12px;
      color: var(--fg2);
    }

    .ref {
      margin-top: 4px;
      font-size: 12px;
    }
    .ref-label {
      color: var(--gray);
      font-style: italic;
      font-size: 10px;
      margin-right: 4px;
    }
    .synref { color: var(--aqua); }

    mark {
      background: var(--yellow);
      color: var(--bg);
      border-radius: 2px;
      padding: 0 1px;
    }
    /* Search highlight uses the CSS Custom Highlight API (no DOM mutation per keystroke).
       ::highlight only supports a few properties — background/color are enough. */
    ::highlight(dict-search) {
      background: var(--yellow);
      color: var(--bg);
    }

    .empty {
      color: var(--gray);
      opacity: 0.5;
      font-size: 13px;
      padding: 20px 0;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }
    .modal-backdrop[hidden] { display: none; }
    .modal {
      background: var(--bg1);
      border: 1px solid var(--bg2);
      border-radius: 6px;
      max-width: 560px;
      width: 100%;
      max-height: 85dvh;
      overflow-y: auto;
      padding: 22px 24px;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: var(--bg2) transparent;
    }
    .modal::-webkit-scrollbar { width: 5px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }
    .modal::-webkit-scrollbar-thumb:hover { background: var(--gray); }
    .modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: var(--gray);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--fg); }
    .modal-title { color: var(--yellow); font-size: 15px; margin-bottom: 4px; }
    .modal-meta { color: var(--gray); font-size: 11px; margin-bottom: 12px; }
    .modal-info { color: var(--fg2); font-size: 13px; line-height: 1.6; }
    .modal-info mark {
      background: none;
      color: var(--fg);
      font-weight: bold;
      padding: 0;
    }
    .modal-info p { margin-bottom: 10px; }
    .foreword-label {
      color: var(--gray);
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 14px 0 6px;
    }
    .modal-info blockquote.foreword {
      border-left: 2px solid var(--bg2);
      padding-left: 12px;
      margin: 0;
      font-style: italic;
      color: var(--fg2);
    }
    .modal-info .foreword-sign {
      font-style: normal;
      color: var(--gray);
      margin-top: 10px;
    }

    /* ── Mobile ──────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      /* Header as a column so the revealed filters can sit BELOW the search row
         (they precede it in the DOM). */
      header { padding: 12px 14px; display: flex; flex-direction: column; }
      .controls { order: 1; }
      .title { font-size: 14px; }
      .subtitle { display: none; }

      /* Controls collapse into 3 stacked rows revealed by the search-row icon:
         dictionaries, words/phrases, fields. No separators on mobile. */
      .controls { flex-direction: column; align-items: stretch; gap: 8px; }
      .ctl-sep { display: none; }
      /* Filter icon lives in the search row (compact, thumb-reachable). */
      .ctl-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        background: var(--bg);
        color: var(--fg2);
        border: 1px solid var(--bg2);
        border-radius: 4px;
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
      }
      .ctl-toggle[aria-expanded="true"] {
        background: var(--yellow);
        color: var(--bg);
        border-color: var(--yellow);
      }

      /* Hidden by default; the icon reveals them. */
      .chips, .toggles { display: none; }
      .controls.open .chips { display: flex; }
      .controls.open .toggles {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      /* Tinier chips on mobile; ⓘ hidden (long-press a chip for its info). */
      .chip { padding: 3px 8px; font-size: 11px; gap: 4px; }
      .info-btn { display: none; }

      /* Pill toggles, sized to match the tinier chips. */
      .tgroup { gap: 6px 8px; }
      .toggle {
        padding: 3px 8px;
        border: 1px solid var(--bg2);
        border-radius: 4px;
        font-size: 11px;
      }

      /* Alphabet rail is unusable by thumb — drop it, give entries the width. */
      .rail { display: none; }
      .entries { padding: 14px 16px 80px; }
      .entry { max-width: none; }

      .modal-backdrop { padding: 12px; }
      .modal { padding: 18px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">The Great Hepster's Dictionary</div>
    <div class="subtitle" id="subtitle"></div>
    <div class="controls" id="controls">
      <div class="chips" id="chips"></div>
      <span class="ctl-sep" aria-hidden="true"></span>
      <div class="toggles" id="toggles">
        <span class="tgroup">
          <button class="toggle active" type="button" data-toggle="words"    aria-pressed="true" title="show single-word entries">words</button>
          <button class="toggle active" type="button" data-toggle="phrases"  aria-pressed="true" title="show multi-word phrase entries">phrases</button>
        </span>
        <span class="ctl-sep" aria-hidden="true"></span>
        <span class="tgroup">
          <button class="toggle active" type="button" data-toggle="examples" aria-pressed="true" title="show example sentences">examples</button>
          <button class="toggle active" type="button" data-toggle="syn"      aria-pressed="true" title="show synonyms">synonyms</button>
          <button class="toggle active" type="button" data-toggle="abbrv"    aria-pressed="true" title="show abbreviations">abbreviations</button>
          <button class="toggle active" type="button" data-toggle="markers"  aria-pressed="true" title="show dictionary color markers">markers</button>
        </span>
      </div>
    </div>
    <div class="search-row">
      <div class="search-box">
        <input id="search" type="text" placeholder="search&hellip;" spellcheck="false" autocomplete="off" autofocus>
        <button class="clear-btn" id="clear" type="button" aria-label="clear search" hidden>&times;</button>
      </div>
      <button class="ctl-toggle" id="ctl-toggle" type="button" aria-label="filters" aria-expanded="false" aria-controls="controls">&#9776;</button>
      <span id="count"></span>
    </div>
  </header>
  <div class="body">
    <nav class="rail" id="rail"></nav>
    <div class="entries" id="entries"></div>
  </div>

  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="close">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    // ─── Data ────────────────────────────────────────────────────────────────────
    // Keyed by initial letter. Entry: { term, senses: [{ pos, def, ex?: [[quote, gloss?]] }], syn?, abbrv? }
    const DICTIONARIES = [
      {
        id: "calloway",
        name: "Calloway",
        title: 'Cab Calloway\'s "Hepster\'s Dictionary"',
        author: "Cab Calloway",
        year: 1944,
        color: "var(--green)",
        info: `<p>In 1938, jazz bandleader and singer <strong>Cab Calloway</strong>
                published <mark>the first dictionary by an African-American</mark>,
                <em>Cab Calloway's Cat-ologue: A "Hepster's" Dictionary</em>, which became
                the <mark>official jive language reference book of the New York Public
                Library</mark>. In 1939, Calloway published an accompanying book,
                <em>Professor Cab Calloway's Swingformation Bureau</em>, which instructed
                readers how to apply the words and phrases from the dictionary. He
                released several editions until 1944, the last being <em>The New Cab
                Calloway's Hepsters Dictionary: Language of Jive</em>.</p>
               <div class="foreword-label">From the 1944 foreword</div>
               <blockquote class="foreword">
                 <p>Some six years ago I compiled the first glossary of words,
                  expressions, and the general patois employed by musicians and
                  entertainers in New York's teeming Harlem. That the general public
                  agreed with me is amply evidenced by the fact that the present issue is
                  the sixth edition since 1938 and is the official jive language reference
                  book of the New York Public Library.</p>
                 <p>"Jive talk" is now an everyday part of the English language. Its usage
                  is now accepted in the movies, on the stage, and in the song products of
                  Tin Pan Alley. It is reasonable to assume that jive will find new
                  avenues in such hitherto remote places as Australia, the South Pacific,
                  North Africa, China, Italy, France, Sicily, and inevitably Germany and
                  wherever our Armed Forces may serve.</p>
                 <p>I don't want to lend the impression here that the many words contained
                  in this edition are the figments of my imagination. They were gathered
                  from every conceivable source. Many first saw the light of printer's ink
                  in Billy Rowe's widely read column "The Notebook," in the Pittsburgh
                  Courier.</p>
                 <p>To the many persons who have contributed to this and the other
                  editions, this volume is respectfully and gratefully dedicated.</p>
                 <p class="foreword-sign">— Cab Calloway</p>
               </blockquote>`,
        file: "data/calloway.json",
      },
      {
        id: "hepcats",
        name: "Hepcats",
        title: 'Hepcats "Jive Talk" Dictionary',
        author: "Lou Shelly (ed.)",
        year: 1945,
        color: "var(--blue)",
        info: `<p>Edited by <strong>Lou Shelly</strong> and published in 1945 by the
                T.W.O. Charles Company, <em>Jive Talk</em> bills itself as
                <mark>the most complete dictionary of jive words and phrases</mark> of its
                day &mdash; over a thousand entries gathered as the Harlem idiom spread
                &ldquo;from one end of the land to the other.&rdquo;</p>
               <div class="foreword-label">From the foreword, &ldquo;Are You Jive Wise?&rdquo;</div>
               <blockquote class="foreword">
                 <p>In the old days the people greeted a new ruler with the cry: &ldquo;The
                  King is dead, long live the King!&rdquo; Today there's a strange shout:
                  &ldquo;Webster is dead, long live the Hepster!&rdquo;</p>
                 <p>A new language has been born and with its usual lustiness youth has made
                  jive talk heard from one end of the land to the other. The Negro who
                  travelled from Africa to Harlem picked up the language of the ofays and
                  embellished it with his rich, racy idioms. It soon became an
                  incomprehensible dialect to all save those who were hep.</p>
                 <p>The Editors feel that jive talk is here to stay and believe that this
                  book is the most complete dictionary of jive words and phrases ever
                  presented. It may be of no assistance to an Abercrombie but we're sure it
                  will help most people a great deal.</p>
                 <p class="foreword-sign">— The Editors</p>
               </blockquote>`,
        file: "data/hepcats.json",
      },
    ];

    // ─── Helpers ─────────────────────────────────────────────────────────────────
    const ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;")
              .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

    function highlight(text, q) {
      const safe = escHtml(text);
      if (!q) return safe;
      // build regex against escaped text so we mark the rendered string
      const re = new RegExp("(" + escReg(escHtml(q)) + ")", "gi");
      return safe.replace(re, "<mark>$1</mark>");
    }

    // id -> dictionary, for quick lookups during render.
    const DICT_BY_ID = Object.fromEntries(DICTIONARIES.map(d => [d.id, d]));

    // Merge key: case-insensitive, whitespace-trimmed headword.
    function normTerm(t) { return t.trim().toLowerCase(); }

    // Merge entries across the active scope into { letter: mergedEntries[] }, where a
    // merged entry is { term, letter, sources: [{ dictId, senses, syn, abbrv }] }.
    // Same normalized term across dictionaries collapses into one headword.
    // Per-scope merged index, built once and cached. Scope only changes when you pick a
    // different dictionary chip; the query never invalidates it, so there's no reason to
    // rebuild the Map + re-sort on every keystroke.
    const indexCache = {};
    function buildIndex(scopeId) {
      if (indexCache[scopeId]) return indexCache[scopeId];
      const dicts = scopeId === "all"
        ? DICTIONARIES
        : DICTIONARIES.filter(d => d.id === scopeId);
      const map = new Map();                         // normKey -> mergedEntry
      for (const d of dicts) {
        for (const l of ALPHA) {
          const bucket = d.data[l];
          if (!bucket) continue;
          for (const e of bucket) {
            const key = normTerm(e.term);
            let m = map.get(key);
            // kind ("word"/"phrase") is a property of the headword, so the first source
            // sets it; same normalized term across dicts shares the same kind.
            if (!m) { m = { term: e.term, _term: key, letter: l, kind: e.kind, sources: [] }; map.set(key, m); }
            // Precompute lowercased haystacks once so search is plain substring tests (no
            // per-keystroke toLowerCase). Kept as separate fields so the examples/syn/abbrv
            // toggles can still gate what's searchable.
            const exText = e.senses.some(s => s.ex)
              ? e.senses.flatMap(s => s.ex || []).map(x => x.join(" ")).join("\n").toLowerCase()
              : "";
            m.sources.push({
              dictId: d.id, senses: e.senses, syn: e.syn, abbrv: e.abbrv,
              _def: e.senses.map(s => s.def).join("\n").toLowerCase(),
              _ex: exText,
              _syn: e.syn ? e.syn.join("\n").toLowerCase() : "",
              _abbrv: e.abbrv ? e.abbrv.join("\n").toLowerCase() : "",
            });
          }
        }
      }
      const groups = {};
      for (const l of ALPHA) groups[l] = [];
      for (const m of map.values()) groups[m.letter].push(m);
      for (const l of ALPHA)
        groups[l].sort((a, b) => a._term.localeCompare(b._term, "en"));
      indexCache[scopeId] = groups;
      return groups;
    }

    // Does one source (a dict's entry body) match the query?
    function sourceMatches(src, ql) {
      if (src._def.includes(ql)) return true;
      // syn/abbrv/examples are searched only while their field toggle is on.
      if (show.examples && src._ex.includes(ql)) return true;
      if (show.syn && src._syn.includes(ql)) return true;
      if (show.abbrv && src._abbrv.includes(ql)) return true;
      return false;
    }

    // An example is [quote, gloss?]: the quote is italicized between guillemets, the
    // optional gloss (a parenthetical translation) follows in roman text.
    function renderExample(e, q) {
      const quote = `<span class="ex">«${highlight(e[0], q)}»</span>`;
      const gloss = e.length > 1 ? ` ${highlight(e[1], q)}` : "";
      return `<div class="ex-line">${quote}${gloss}</div>`;
    }

    // Render definition prose, italicizing references: the headword when it cites itself
    // (e.g. Ow!), and the term(s) following a "see" / "same as" cross-reference.
    function renderDef(def, term, q) {
      const escR = (x) => x.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const ranges = [];
      const reTerm = new RegExp("(?<![A-Za-z0-9])" + escR(term) + "(?![A-Za-z0-9])", "gi");
      let m;
      while ((m = reTerm.exec(def))) ranges.push([m.index, m.index + m[0].length]);
      const reSee = /\b(?:see|same as)\s+([^).]*)/gi;
      while ((m = reSee.exec(def))) {
        let off = m.index + m[0].length - m[1].length;
        for (const part of m[1].split(/([;,])/)) {
          if (part === ";" || part === ",") { off += part.length; continue; }
          const lead = part.length - part.trimStart().length;
          const t = part.trim();
          if (t) ranges.push([off + lead, off + lead + t.length]);
          off += part.length;
        }
      }
      ranges.sort((a, b) => a[0] - b[0]);
      let html = "", pos = 0;
      for (const [s, e] of ranges) {
        if (s < pos) continue;                         // skip overlaps
        html += highlight(def.slice(pos, s), q) + `<i>${highlight(def.slice(s, e), q)}</i>`;
        pos = e;
      }
      return html + highlight(def.slice(pos), q);
    }

    // Every entry shows numbered senses ("1.", "2.", …) with the part-of-speech beside
    // the number, the definition prose, then each example on its own line below it.
    function buildSenses(senses, term, q) {
      let h = '<div class="def">';
      senses.forEach((s, i) => {
        const mark = `<span class="smark"><span class="snum">${i + 1}.</span>` +
                     (s.pos ? `<span class="spos">${escHtml(s.pos)}</span>` : "") + `</span>`;
        let body = `<div class="def-text">${renderDef(s.def, term, q)}</div>`;
        if (show.examples && s.ex) for (const e of s.ex) body += renderExample(e, q);
        h += `<div class="sense">${mark}<div class="sbody">${body}</div></div>`;
      });
      return h + "</div>";
    }

    // ─── Render ──────────────────────────────────────────────────────────────────
    // Active filter: "all" (search every dictionary) or a dictionary id.
    let activeId = "all";
    // Toggle state. words/phrases are entry filters (hide that kind of headword);
    // examples/syn/abbrv are field-visibility toggles (gate both render AND search).
    const show = { words: true, phrases: true, examples: true, syn: true, abbrv: true, markers: true };

    const entriesEl = document.getElementById("entries");
    const countEl   = document.getElementById("count");
    const railEl    = document.getElementById("rail");
    const chipsEl   = document.getElementById("chips");
    const subtitleEl = document.getElementById("subtitle");

    function buildChips() {
      // Each dict chip carries its color via --chip: colored border when idle, filled
      // when active. "All" uses a neutral gray.
      let h = `<button class="chip" data-id="all" style="--chip:var(--yellow)">All</button>`;
      for (const d of DICTIONARIES) {
        h += `<button class="chip" data-id="${escHtml(d.id)}" style="--chip:${d.color}">${escHtml(d.name)}` +
             `<span class="info-btn" data-info="${escHtml(d.id)}" aria-label="about ${escHtml(d.name)}" title="about ${escHtml(d.name)}">&#9432;</span>` +
             `</button>`;
      }
      chipsEl.innerHTML = h;
      updateChips();
    }

    function updateChips() {
      chipsEl.querySelectorAll(".chip").forEach(c =>
        c.classList.toggle("active", c.dataset.id === activeId));
      subtitleEl.textContent = activeId === "all"
        ? "All dictionaries"
        : DICT_BY_ID[activeId].title;
    }

    const modalEl   = document.getElementById("modal");
    const modalBody = document.getElementById("modal-body");

    function openModal(id) {
      const d = DICT_BY_ID[id];
      if (!d) return;
      modalBody.innerHTML =
        `<h2 class="modal-title" id="modal-title" style="color:${d.color}">${escHtml(d.title)}</h2>` +
        `<div class="modal-meta">${escHtml(d.author)} &middot; ${escHtml(String(d.year))}</div>` +
        `<div class="modal-info">${d.info}</div>`;
      modalEl.hidden = false;
    }
    function closeModal() { modalEl.hidden = true; }

    function buildRail() {
      railEl.innerHTML = ALPHA.map(l =>
        `<a href="#letter-${l}" data-letter="${l}">${l}</a>`).join("");
    }

    // Windowed rendering: a search computes the full match list in memory (cheap substring
    // tests over the prebuilt index), but only a CHUNK of entries is ever in the DOM. More
    // are appended as the sentinel scrolls into view. Small DOM = every keystroke is fast,
    // so there's no debounce — typing filters synchronously.
    const CHUNK = 60;
    let matched = [];        // [{ m, sources }] to render, letter-ordered
    let renderPos = 0;       // index of the next entry to render into the DOM
    let curQuery = "";
    let curQL = "";
    let openSectionEl = null, openLetter = null;   // the letter-group currently accepting entries
    const emptyEl = document.createElement("div");
    emptyEl.className = "empty";
    // CSS Custom Highlight API paints matches without touching the DOM. Degrades to no
    // highlight (text still filters correctly) where unsupported (iOS < 17.2).
    const HL_OK = typeof CSS !== "undefined" && CSS.highlights && typeof Highlight !== "undefined";

    // The sentinel sits at the bottom of the list; when it scrolls near the viewport the
    // observer appends the next chunk. rootMargin pre-loads before it's actually visible,
    // and also auto-fills short lists (keeps firing until the viewport is covered).
    const sentinel = document.createElement("div");
    sentinel.style.height = "1px";
    const observer = new IntersectionObserver(ents => {
      if (ents.some(e => e.isIntersecting)) renderChunk();
    }, { root: entriesEl, rootMargin: "800px 0px" });

    const refLine = (lbl, arr) => (arr && arr.length)
      ? `<div class="ref"><span class="ref-label">${lbl}</span> ` +
        arr.map(s => `<span class="synref">${escHtml(s)}</span>`).join(", ") +
        `</div>`
      : "";

    // HTML for a single merged entry. `sources` is the subset to show (all of them on a
    // headword hit; only the matching blocks on a body-only hit). Highlight is painted
    // separately by the Highlight API, so senses are built with an empty query here.
    function entryHTML(item) {
      const m = item.m;
      const dots = show.markers ? m.sources.map(src => {
        const dict = DICT_BY_ID[src.dictId];
        return `<span class="dot" style="background:${dict.color}" title="${escHtml(dict.name)}"></span>`;
      }).join("") : "";
      let html = `<div class="entry"><span class="term">${escHtml(m.term)}</span>${dots}`;
      const multi = show.markers && item.sources.length > 1;
      for (const src of item.sources) {
        const block = multi
          ? ` class="src-block tinted" style="--c:${DICT_BY_ID[src.dictId].color}"`
          : ` class="src-block"`;
        html += `<div${block}>` +
                  buildSenses(src.senses, m.term, "") +
                  (show.syn ? refLine("syn.", src.syn) : "") +
                  (show.abbrv ? refLine("abbrv.", src.abbrv) : "") +
                `</div>`;
      }
      return html + `</div>`;
    }

    // Compute the full match list for the current scope + toggles + query. `total` is the
    // scope size after the words/phrases filter (the count denominator), independent of q.
    function computeMatched(ql) {
      const idx = buildIndex(activeId);
      const list = [];
      let total = 0;
      for (const l of ALPHA) {
        for (const m of idx[l]) {
          if (m.kind === "phrase" ? !show.phrases : !show.words) continue;
          total++;
          if (!ql || m._term.includes(ql)) { list.push({ m, sources: m.sources }); continue; }
          const hit = m.sources.filter(src => sourceMatches(src, ql));
          if (hit.length) list.push({ m, sources: hit });
        }
      }
      return { list, total };
    }

    // Append entries into the right letter-group, opening a new section when the letter
    // changes (a letter's entries can straddle a chunk boundary — openLetter carries over).
    function renderChunk() {
      const end = Math.min(renderPos + CHUNK, matched.length);
      for (; renderPos < end; renderPos++) {
        const item = matched[renderPos];
        const l = item.m.letter;
        if (l !== openLetter) {
          const sec = document.createElement("section");
          sec.className = "letter-group";
          sec.dataset.letter = l;
          sec.innerHTML = `<h2 class="letter" id="letter-${l}">${l}</h2>`;
          entriesEl.insertBefore(sec, sentinel);
          openSectionEl = sec;
          openLetter = l;
        }
        openSectionEl.insertAdjacentHTML("beforeend", entryHTML(item));
      }
      if (renderPos >= matched.length) {
        observer.unobserve(sentinel);
        sentinel.style.display = "none";
      } else {
        sentinel.style.display = "";
        observer.observe(sentinel);
      }
      paintHighlight(curQL);
    }

    // A new search / scope / toggle: recompute matches, reset the DOM to the first chunk.
    function runSearch(q) {
      curQuery = q;
      curQL = q.trim().toLowerCase();
      const { list, total } = computeMatched(curQL);
      matched = list;
      renderPos = 0;
      openSectionEl = null;
      openLetter = null;

      countEl.textContent = matched.length + " / " + total;
      const present = new Set(matched.map(it => it.m.letter));
      railEl.querySelectorAll("a").forEach(a =>
        a.classList.toggle("dim", !present.has(a.dataset.letter)));

      observer.unobserve(sentinel);
      entriesEl.textContent = "";
      entriesEl.appendChild(sentinel);

      if (!matched.length) {
        sentinel.style.display = "none";
        emptyEl.hidden = false;
        emptyEl.innerHTML = `no jive found for &ldquo;${escHtml(q.trim())}&rdquo;.`;
        entriesEl.appendChild(emptyEl);
        if (HL_OK) CSS.highlights.set("dict-search", new Highlight());
        return;
      }
      emptyEl.hidden = true;
      entriesEl.scrollTop = 0;
      renderChunk();
    }

    // Rail jump: the target letter may live past the rendered window, so render forward
    // until its section exists (or the list runs out), then scroll to it.
    function jumpToLetter(letter) {
      let guard = 0;
      while (renderPos < matched.length &&
             !document.getElementById("letter-" + letter) && guard++ < 500) {
        renderChunk();
      }
      const t = document.getElementById("letter-" + letter);
      if (t) t.scrollIntoView({ behavior: "auto", block: "start" });
    }

    // Repaint the search highlight over the rendered window via the Highlight API — ranges
    // only, no DOM writes. Everything in the DOM is a match, so the walk is over the window,
    // which stays small. 1-char queries are skipped (near-everything would highlight).
    function paintHighlight(ql) {
      if (!HL_OK) return;
      const hl = new Highlight();
      if (ql.length >= 2) {
        const walker = document.createTreeWalker(entriesEl, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          const text = node.nodeValue.toLowerCase();
          let idx = text.indexOf(ql);
          while (idx !== -1) {
            const range = document.createRange();
            range.setStart(node, idx);
            range.setEnd(node, idx + ql.length);
            hl.add(range);
            idx = text.indexOf(ql, idx + ql.length);
          }
        }
      }
      CSS.highlights.set("dict-search", hl);
    }

    // ─── Wire up ─────────────────────────────────────────────────────────────────
    const search = document.getElementById("search");
    const clearBtn = document.getElementById("clear");
    const syncClear = () => { clearBtn.hidden = !search.value; };
    // No debounce: windowed rendering keeps the DOM small, so every keystroke filters and
    // repaints the first chunk synchronously — fast even on a held backspace.
    search.addEventListener("input", () => {
      syncClear();
      runSearch(search.value);
    });
    clearBtn.addEventListener("click", () => {
      search.value = "";
      syncClear();
      search.focus();
      runSearch("");
    });
    const controlsEl = document.getElementById("controls");
    const ctlToggle = document.getElementById("ctl-toggle");
    ctlToggle.addEventListener("click", () => {
      const open = controlsEl.classList.toggle("open");
      ctlToggle.setAttribute("aria-expanded", String(open));
    });
    const togglesEl = document.getElementById("toggles");
    togglesEl.addEventListener("click", e => {
      const btn = e.target.closest(".toggle");
      if (!btn) return;
      const key = btn.dataset.toggle;
      show[key] = !show[key];
      btn.classList.toggle("active", show[key]);
      btn.setAttribute("aria-pressed", String(show[key]));
      runSearch(curQuery);   // toggles change built content (and search semantics)
    });
    railEl.addEventListener("click", e => {
      const a = e.target.closest("a");
      if (!a) return;
      e.preventDefault();
      jumpToLetter(a.dataset.letter);
    });
    // Long-press a chip to open its info modal (the on-chip ⓘ is hidden on mobile).
    // A fired long-press suppresses the click that would otherwise select the chip.
    let lpTimer = null, lpFired = false;
    const cancelLP = () => clearTimeout(lpTimer);
    chipsEl.addEventListener("pointerdown", e => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      lpFired = false;
      lpTimer = setTimeout(() => { lpFired = true; openModal(chip.dataset.id); }, 450);
    });
    chipsEl.addEventListener("pointerup", cancelLP);
    chipsEl.addEventListener("pointerleave", cancelLP);
    chipsEl.addEventListener("pointercancel", cancelLP);
    chipsEl.addEventListener("click", e => {
      if (lpFired) { lpFired = false; return; }
      const info = e.target.closest(".info-btn");
      if (info) { e.stopPropagation(); openModal(info.dataset.info); return; }
      const chip = e.target.closest(".chip");
      if (!chip) return;
      activeId = chip.dataset.id;
      updateChips();
      runSearch(curQuery);   // scope change rebuilds the entry list
    });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && !modalEl.hidden) closeModal();
    });

    // Term data lives in per-dictionary JSON (d.file); metadata stays inline above.
    // Fetch each dict's data, attach it, then do the first render. Served over HTTP
    // by shtatic locally and GitHub Pages in production, so fetch is available.
    async function boot() {
      try {
        await Promise.all(DICTIONARIES.map(async d => {
          const res = await fetch(d.file);
          if (!res.ok) throw new Error(`${d.file}: ${res.status}`);
          d.data = await res.json();
        }));
      } catch (err) {
        entriesEl.innerHTML =
          `<p class="empty">Couldn't load dictionary data (${escHtml(String(err.message || err))}).</p>`;
        return;
      }
      buildRail();
      buildChips();
      runSearch(search.value);
    }
    boot();
  </script>
</body>
</html>
